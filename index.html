<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cronômetro de Estudos</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <h1>Cronômetro de Estudos</h1>
  <div class="timer-box">
    <div class="timer" id="display">00:00:00</div>
  </div>
  
  <div class="buttons">
    <button onclick="startTimer()"><i class="fas fa-play"></i> Iniciar</button>
    <button onclick="pauseTimer()"><i class="fas fa-pause"></i> Pausar</button>
    <button onclick="resetTimer()"><i class="fas fa-rotate-left"></i> Resetar</button>
  </div>

  <!-- Pomodoro -->
  <div class="pomodoro-config">
    <label for="pomodoroFocus"><i class="fas fa-bullseye"></i> Foco (min):</label>
    <input type="number" id="pomodoroFocus" min="1" step="1" value="25">
    <label for="pomodoroBreak"><i class="fas fa-coffee"></i> Descanso (min):</label>
    <input type="number" id="pomodoroBreak" min="1" step="1" value="5">
  </div>
  <div class="pomodoro-buttons">
    <button id="btnTogglePomodoro"><i class="fas fa-clock"></i> Ativar Pomodoro</button>
    <button id="btnStartPomodoro"><i class="fas fa-play-circle"></i> Iniciar Ciclo</button>
  </div>

  <div class="edit-buttons">
    <button onclick="editarTempoHoje()"><i class="fas fa-pen"></i> Editar tempo de hoje</button>
    <button onclick="removerTempoHoje()"><i class="fas fa-trash"></i> Remover tempo de hoje</button>
  </div>

  <div class="log">
    <h2>Horas Estudadas por Dia da Semana</h2>
    <div class="meta-container">
      <label for="metaHoras">Meta semanal (horas): </label>
      <input type="number" id="metaHoras" min="0" step="0.5" value="10">
    </div>
    <div id="totalSemana" class="total-semana-box">
      Total da semana: 0.00 h
    </div>
    <table id="studyTable">
      <tr><th>Dia</th><th>Tempo Total</th></tr>
    </table>
  </div>

  <div class="charts">
    <h2>Gráficos de Desempenho</h2>
    <canvas id="chartAcumuladoSemanal"></canvas>
    <div id="heatmapContainer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
